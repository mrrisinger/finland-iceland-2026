  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #1a1a1a; color: #e8e0d4; }

    header {
      text-align: center;
      padding: 64px 20px 48px;
      border-bottom: 1px solid #2e2e2e;
    }
    header h1 { font-size: 2.6rem; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; }
    header p { margin-top: 10px; font-size: 0.9rem; color: #666; letter-spacing: 0.08em; }

    .gallery {
      columns: 3;
      column-gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    figure {
      break-inside: avoid;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
    }

    figure img {
      width: 100%;
      display: block;
      transition: opacity 0.2s;
    }
    figure:hover img { opacity: 0.82; }

    figcaption {
      padding: 8px 10px 10px;
      font-size: 0.82rem;
      line-height: 1.5;
      color: #b0a090;
      background: #111;
      font-style: italic;
    }

    @media (max-width: 900px) { .gallery { columns: 2; } }
    @media (max-width: 560px) { .gallery { columns: 1; } header h1 { font-size: 1.7rem; } }

    /* Lightbox */
    #lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.96); z-index:1000; align-items:center; justify-content:center; }
    #lb.on { display:flex; flex-direction:column; }
    #lb-img { max-width:92vw; max-height:80vh; object-fit:contain; }
    #lb-cap { max-width:80vw; margin-top:14px; font-size:0.9rem; color:#b0a090; font-style:italic; text-align:center; line-height:1.55; }
    #lb-counter { margin-top:8px; font-size:0.78rem; color:#555; font-family:sans-serif; }
    .lb-x { position:fixed; top:14px; right:22px; color:#777; font-size:2rem; cursor:pointer; font-family:sans-serif; line-height:1; }
    .lb-x:hover { color:#fff; }
    .lb-arr { position:fixed; top:50%; transform:translateY(-50%); color:#777; font-size:3rem; cursor:pointer; padding:16px 18px; font-family:sans-serif; user-select:none; }
    .lb-arr:hover { color:#fff; }
    #lb-prev { left:0; }

<div id="lb">
  <span class="lb-x" onclick="closeLb()">&times;</span>
  <span class="lb-arr" id="lb-prev" onclick="lbNav(-1)">&#8249;</span>
  <img id="lb-img" src="" alt="">
  <div id="lb-cap"></div>
  <div id="lb-counter"></div>
  <span class="lb-arr" id="lb-next" onclick="lbNav(1)">&#8250;</span>
</div>

<script>
  const figs = [...document.querySelectorAll('figure')];
  let idx = 0;
  function openLb(src) {
    idx = figs.findIndex(f => f.querySelector('img').src.endsWith(src));
    showLb();
    document.getElementById('lb').classList.add('on');
  }
  function closeLb() { document.getElementById('lb').classList.remove('on'); }
  function lbNav(d) { idx = (idx + d + figs.length) % figs.length; showLb(); }
  function showLb() {
    const fig = figs[idx];
    document.getElementById('lb-img').src = fig.querySelector('img').src;
    const cap = fig.querySelector('figcaption');
    document.getElementById('lb-cap').innerHTML = cap ? cap.innerHTML : '';
    document.getElementById('lb-counter').textContent = (idx+1) + ' / ' + figs.length;
  }
  document.getElementById('lb').addEventListener('click', e => { if (e.target.id==='lb') closeLb(); });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb').classList.contains('on')) return;
    if (e.key==='Escape') closeLb();
    if (e.key==='ArrowRight') lbNav(1);
    if (e.key==='ArrowLeft') lbNav(-1);
  });
</script>
